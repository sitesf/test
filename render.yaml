# ==============================================================================
# Render Blueprint pentru Tufani (web service + PostgreSQL)
# Deploy: Render Dashboard -> New -> Blueprint -> selectați acest repo.
# Detalii pas cu pas în README.md (secțiunea "Deploy pe Render").
# ==============================================================================

databases:
  - name: tufani-db
    databaseName: tufani
    user: tufani
    plan: basic-256mb # alegeți planul potrivit; "free" expiră după 30 de zile

services:
  - type: web
    name: tufani
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    # Sincronizează schema Prisma cu baza de date înainte de fiecare deploy
    preDeployCommand: npx prisma db push --skip-generate
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: tufani-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true # Render generează automat un secret sigur
      - key: NEXTAUTH_URL
        sync: false # setați manual: https://<numele-serviciului>.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false # setați manual din Stripe Dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # setați manual după crearea webhook-ului în Stripe
      - key: ADMIN_EMAIL
        sync: false # email-ul contului de admin (folosit de seed)
      - key: ADMIN_PASSWORD
        sync: false # parola contului de admin (folosit de seed)
